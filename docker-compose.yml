version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bes_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bes_db
    ports:
      - "5433:5432" # Expone al puerto 5433 del host para administración remota
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bes_backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bes_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PUPPETEER_HEADLESS=true # Modo oculto obligatorio dentro de Docker
      - PORT=3000
    ports:
      - "4000:3000" # Expone la API en el puerto 4000 del host
    volumes:
      - ./backend/uploads:/app/uploads # Persiste los PDFs descargados en el disco local
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000 # Cambiar por la IP local de la workstation en producción (ej: http://192.168.1.50:4000)
    container_name: bes_frontend
    ports:
      - "3000:3000" # Expone la interfaz web en el puerto 3000 del host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
